; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:blackpill_f411ce]
platform = ststm32
board = blackpill_f411ce
framework = arduino
upload_protocol = stlink
debug_tool = stlink
debug_speed = 400
upload_flags =
  -c
  adapter speed 400
monitor_speed = 115200

lib_deps =
  baracodadailyhealthtech/tinyusb@0.17.0
  adafruit/Adafruit NeoPixel
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  olikraus/U8g2
  uberi/CommandParser @ ^1.1.0
  mathertel/RotaryEncoder
  stm32duino/STM32duino RTC
  adafruit/RTClib
  sparkfun/SparkFun External EEPROM Arduino Library
  https://github.com/adafruit/ENS160_driver.git
  adafruit/Adafruit VEML7700 Library
  sensirion/Sensirion I2C SCD4x
  sensirion/arduino-sht


build_flags =
  -I include
  -I include/bus
  -I include/config
  -I include/core
  -I include/input
  -I include/light
  -I include/ui
  -I include/usb
  -I lib/DeskBridgeCore/src
  -I lib/shell
  '-D BUILD_UNIX_TIME=$UNIX_TIME'
  -D RTC_UPLOAD_OFFSET_SECONDS=4
  -D RTC_LOCAL_OFFSET_SECONDS=7200
  -D PIO_FRAMEWORK_ARDUINO_NO_MAIN
