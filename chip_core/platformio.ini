[env:esp32-s3-devkitc-uart]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_size = 16MB
board_build.psram = enabled

upload_protocol = esptool
upload_port = COM45
monitor_port = COM45
monitor_speed = 115200

lib_deps =
  adafruit/Adafruit NeoPixel
  adafruit/DHT sensor library
  adafruit/Adafruit Unified Sensor
  olikraus/U8g2
  uberi/CommandParser @ ^1.1.0
  mathertel/RotaryEncoder
  adafruit/RTClib
  sparkfun/SparkFun External EEPROM Arduino Library
  https://github.com/adafruit/ENS160_driver.git
  adafruit/Adafruit VEML7700 Library
  sensirion/Sensirion I2C SCD4x
  sensirion/arduino-sht

build_flags =
  -I include
  -I include/bus
  -I include/config
  -I include/core
  -I include/input
  -I include/light
  -I include/ui
  -I lib/DeskBridgeCore/src
  -I lib/shell
  -std=gnu++17
  '-D BUILD_UNIX_TIME=$UNIX_TIME'
  -D RTC_UPLOAD_OFFSET_SECONDS=4
  -D RTC_LOCAL_OFFSET_SECONDS=7200
  -D ARDUINO_USB_MODE=0
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_RUNNING_CORE=0
  -D ARDUINO_EVENT_RUNNING_CORE=0
  -D DESKBRIDGE_TARGET_ESP32S3

build_unflags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_RUNNING_CORE=1
  -DARDUINO_EVENT_RUNNING_CORE=1
  -std=gnu++11

build_src_filter =
  +<*>
  -<otros/usb/tinyusb_dwc2_port.c>
  -<otros/usb/usb_descriptors.cpp>
